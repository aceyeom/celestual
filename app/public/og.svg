<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Georgia, 'Times New Roman', serif">
  <!-- the share card: deep navy, generous emptiness, one warm star. -->
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1425"/>
      <stop offset="55%" stop-color="#070B14"/>
      <stop offset="100%" stop-color="#05080F"/>
    </linearGradient>
    <radialGradient id="starcore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="42%" stop-color="#FFE3C8"/>
      <stop offset="100%" stop-color="#FFA25C"/>
    </radialGradient>
    <radialGradient id="starhalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFA25C" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#FFA25C" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FFA25C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#night)"/>

  <!-- the sparse field — still, faint, cool; a few warm motes -->
  <g fill="#E2E8F4">
    <circle cx="120" cy="90" r="1.4" opacity="0.4"/>
    <circle cx="210" cy="150" r="1" opacity="0.28"/>
    <circle cx="90" cy="260" r="1.2" opacity="0.34"/>
    <circle cx="170" cy="380" r="1.5" opacity="0.42"/>
    <circle cx="260" cy="470" r="1" opacity="0.28"/>
    <circle cx="80" cy="520" r="1.3" opacity="0.34"/>
    <circle cx="330" cy="300" r="0.9" opacity="0.24"/>
    <circle cx="420" cy="120" r="1.3" opacity="0.4"/>
    <circle cx="500" cy="220" r="0.9" opacity="0.22"/>
    <circle cx="560" cy="500" r="1.2" opacity="0.32"/>
    <circle cx="680" cy="140" r="1.1" opacity="0.3"/>
    <circle cx="760" cy="250" r="0.9" opacity="0.22"/>
    <circle cx="840" cy="120" r="1.4" opacity="0.4"/>
    <circle cx="930" cy="210" r="1" opacity="0.28"/>
    <circle cx="1010" cy="140" r="1.2" opacity="0.36"/>
    <circle cx="1080" cy="250" r="1.1" opacity="0.3"/>
    <circle cx="1130" cy="90" r="1.3" opacity="0.4"/>
    <circle cx="990" cy="350" r="0.9" opacity="0.22"/>
    <circle cx="1100" cy="430" r="1.2" opacity="0.32"/>
    <circle cx="1040" cy="540" r="1.4" opacity="0.4"/>
    <circle cx="900" cy="560" r="1" opacity="0.28"/>
    <circle cx="730" cy="540" r="1.1" opacity="0.3"/>
    <circle cx="640" cy="430" r="0.9" opacity="0.22"/>
    <circle cx="450" cy="540" r="1.3" opacity="0.34"/>
    <circle cx="380" cy="430" r="0.9" opacity="0.22"/>
  </g>
  <g fill="#FFA25C">
    <circle cx="300" cy="210" r="1.2" opacity="0.35"/>
    <circle cx="1060" cy="330" r="1.3" opacity="0.35"/>
    <circle cx="150" cy="180" r="1" opacity="0.3"/>
    <circle cx="820" cy="430" r="1.1" opacity="0.3"/>
  </g>

  <!-- the star — the only bright thing -->
  <g transform="translate(920,220)">
    <circle r="140" fill="url(#starhalo)"/>
    <path d="M0 -60 Q7 -8 60 0 Q7 8 0 60 Q-7 8 -60 0 Q-7 -8 0 -60 Z" fill="url(#starcore)"/>
  </g>

  <!-- wordmark — the metadata register -->
  <text x="100" y="140" font-family="'Courier New', monospace" font-size="26" letter-spacing="10" fill="#8B94A8">CELESTUAL</text>

  <!-- the hero — serif italic, the emotional register -->
  <text x="98" y="320" font-size="66" font-style="italic" fill="#F2EEE5">you still think about them.</text>
  <text x="98" y="404" font-size="66" font-style="italic" fill="#FFA25C">what if they think about you?</text>

  <!-- the mechanics — small quiet sans -->
  <text x="100" y="496" font-family="Helvetica, Arial, sans-serif" font-size="24" letter-spacing="0.4" fill="#8B94A8">enter their handle. they never find out — unless they enter you too.</text>
  <text x="100" y="534" font-family="Helvetica, Arial, sans-serif" font-size="24" letter-spacing="0.4" fill="#8B94A8">then you both do, at the same moment.</text>
</svg>
