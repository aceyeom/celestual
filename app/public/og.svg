<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <radialGradient id="space" cx="50%" cy="34%" r="85%">
      <stop offset="0%" stop-color="#1B1330"/>
      <stop offset="46%" stop-color="#100B1E"/>
      <stop offset="100%" stop-color="#070510"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFE9CF" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#FFB988" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#FFB988" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7E6BA8" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#7E6BA8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E6749E" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#E6749E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="starcore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="36%" stop-color="#FFE2C4"/>
      <stop offset="100%" stop-color="#FF9E6B"/>
    </radialGradient>
    <radialGradient id="starhalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF9E6B" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#E6749E" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#E6749E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#space)"/>

  <!-- nebula gas + galactic core glow -->
  <ellipse cx="320" cy="180" rx="420" ry="320" fill="url(#neb1)"/>
  <ellipse cx="940" cy="470" rx="460" ry="340" fill="url(#neb2)"/>
  <ellipse cx="600" cy="320" rx="540" ry="300" fill="url(#core)"/>

  <!-- deep-field starfield -->
  <g fill="#ffffff">
    <circle cx="120" cy="90" r="1.6" opacity="0.7"/>
    <circle cx="210" cy="150" r="1.1" opacity="0.5"/>
    <circle cx="90" cy="260" r="1.3" opacity="0.6"/>
    <circle cx="170" cy="380" r="1.7" opacity="0.75"/>
    <circle cx="260" cy="470" r="1.1" opacity="0.5"/>
    <circle cx="80" cy="520" r="1.4" opacity="0.6"/>
    <circle cx="330" cy="300" r="1" opacity="0.45"/>
    <circle cx="420" cy="120" r="1.5" opacity="0.7"/>
    <circle cx="500" cy="220" r="1" opacity="0.4"/>
    <circle cx="560" cy="500" r="1.3" opacity="0.6"/>
    <circle cx="680" cy="140" r="1.2" opacity="0.55"/>
    <circle cx="760" cy="250" r="1" opacity="0.4"/>
    <circle cx="840" cy="120" r="1.6" opacity="0.7"/>
    <circle cx="930" cy="210" r="1.1" opacity="0.5"/>
    <circle cx="1010" cy="140" r="1.4" opacity="0.65"/>
    <circle cx="1080" cy="250" r="1.2" opacity="0.55"/>
    <circle cx="1130" cy="90" r="1.5" opacity="0.7"/>
    <circle cx="990" cy="350" r="1" opacity="0.4"/>
    <circle cx="1100" cy="430" r="1.3" opacity="0.6"/>
    <circle cx="1040" cy="540" r="1.6" opacity="0.7"/>
    <circle cx="900" cy="560" r="1.1" opacity="0.5"/>
    <circle cx="730" cy="540" r="1.2" opacity="0.55"/>
    <circle cx="640" cy="430" r="1" opacity="0.4"/>
    <circle cx="450" cy="540" r="1.4" opacity="0.6"/>
    <circle cx="380" cy="430" r="1" opacity="0.4"/>
  </g>
  <g fill="#BFD3FA">
    <circle cx="300" cy="210" r="1.4" opacity="0.6"/>
    <circle cx="1060" cy="330" r="1.5" opacity="0.6"/>
    <circle cx="150" cy="180" r="1.2" opacity="0.5"/>
    <circle cx="820" cy="430" r="1.3" opacity="0.55"/>
  </g>

  <!-- the hero glisten -->
  <g transform="translate(905,235)">
    <circle r="120" fill="url(#starhalo)"/>
    <path d="M0 -64 Q7.6 -8.4 64 0 Q7.6 8.4 0 64 Q-7.6 8.4 -64 0 Q-7.6 -8.4 0 -64 Z" fill="url(#starcore)"/>
    <path d="M0 -34 L0 34 M-34 0 L34 0" stroke="#fff" stroke-width="1" stroke-opacity="0.5" stroke-linecap="round"/>
  </g>
  <g transform="translate(1010,150)">
    <path d="M0 -16 Q2 -2.2 16 0 Q2 2.2 0 16 Q-2 2.2 -16 0 Q-2 -2.2 0 -16 Z" fill="#ffffff" opacity="0.92"/>
  </g>

  <!-- wordmark -->
  <text x="100" y="150" font-size="30" letter-spacing="8" fill="#F3ECF6" opacity="0.92">Celestual</text>

  <!-- hero headline (mirrors the landing) -->
  <text x="98" y="318" font-size="70" fill="#F3ECF6">You still think about them.</text>
  <text x="98" y="408" font-size="70" font-style="italic" fill="#FF9E6B">What if they think about you?</text>

  <!-- tagline -->
  <g transform="translate(100,492)">
    <circle cx="9" cy="-5" r="3.4" fill="#FF9E6B"/>
    <text x="26" y="0" font-family="Helvetica, Arial, sans-serif" font-size="25" letter-spacing="0.5" fill="#9E92B6">Anonymous unless it's mutual. One-sided entries are never revealed.</text>
  </g>
</svg>
