<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Celestual">
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="34%" stop-color="#FFE2C4"/>
      <stop offset="78%" stop-color="#FF9E6B"/>
      <stop offset="100%" stop-color="#F2855A"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF9E6B" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#E6749E" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#E6749E" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="#0B0814"/>
  <!-- soft amber→rose bloom -->
  <circle cx="16" cy="16" r="14" fill="url(#halo)"/>
  <!-- the glisten: a four-point sparkle with concave, pinched arms -->
  <path d="M16 2.5
           Q17.4 14.1 29.5 16
           Q17.4 17.9 16 29.5
           Q14.6 17.9 2.5 16
           Q14.6 14.1 16 2.5 Z" fill="url(#core)"/>
  <!-- a faint cross-glint through the core -->
  <path d="M16 6 L16 26 M6 16 L26 16" stroke="#fff" stroke-width="0.4" stroke-opacity="0.5" stroke-linecap="round"/>
  <!-- a small secondary sparkle, up and to the right -->
  <path d="M23.5 7
           Q23.9 9.3 26 9.6
           Q23.9 9.9 23.5 12.2
           Q23.1 9.9 21 9.6
           Q23.1 9.3 23.5 7 Z" fill="#ffffff" opacity="0.92"/>
</svg>
