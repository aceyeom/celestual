# Supabase CLI config for CELESTUAL.
# `project_id` is a local label; link to your cloud project with:
#   supabase link --project-ref <your-project-ref>
project_id = "celestual"

[db]
# Local dev database port (only used by `supabase start`).
port = 54322
major_version = 15

# Edge functions are invoked by anonymous visitors (with the project's anon key),
# so JWT verification is disabled; each function enforces its own checks.
[functions.celestual-notify]
verify_jwt = false

[functions.celestual-remind]
verify_jwt = false

[functions.celestual-search]
verify_jwt = false

# Called by Meta's webhook (not our clients), so JWT verification is off; the
# function enforces its own X-Hub-Signature-256 check instead.
[functions.celestual-ig-webhook]
verify_jwt = false

# Called by ManyChat's External Request (the no-Meta-portal path), authenticated by
# a shared secret instead of a JWT.
[functions.celestual-manychat]
verify_jwt = false

# School (.edu) email verification. Invoked by anonymous visitors (with the anon
# key) from the join sheet, so JWT verification is off; the function enforces its
# own domain check, per-address rate limit, and code-hash comparison instead.
[functions.celestual-edu-verify]
verify_jwt = false

# Durable, DM-free re-login (the email magic link). Invoked by anonymous visitors
# (with the anon key) from the sign-back-in flow and the /signin redeem, so JWT
# verification is off; identity rests on the one-time emailed token + the
# proof-gated binding, both enforced in service-role-only RPCs.
[functions.celestual-relogin]
verify_jwt = false
